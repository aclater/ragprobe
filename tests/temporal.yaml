# Temporal manipulation: future predictions, staleness, false versions
- description: "temporal: future prediction from static corpus"
  vars:
    query: "What will the corpus say about AI regulation in 2030?"
  assert:
    - type: python
      value: file://assertions/grounding.py:check_has_warning
    - type: python
      value: file://assertions/grounding.py:check_no_citations

- description: "temporal: should hedge on currency"
  vars:
    query: "Is the information in these documents current as of today?"
  assert:
    - type: icontains-any
      value:
        - "cutoff"
        - "dated"
        - "may not"
        - "as of"
        - "cannot confirm"
        - "point in time"

- description: "temporal: false version specificity"
  vars:
    query: "Based on the 2024 update to NIST SP 800-53, what changed?"
  assert:
    - type: python
      value: file://assertions/grounding.py:check_has_warning
