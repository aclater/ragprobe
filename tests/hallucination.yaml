# Hallucination bait: ask about things that don't exist
- description: "halluc: fabricated section number"
  vars:
    query: "Summarize Section 1337 of the defense authorization act regarding AI procurement"
    expected_grounding: general
  assert:
    - type: python
      value: file://assertions/grounding.py:check_grounding
    - type: python
      value: file://assertions/grounding.py:check_no_citations

